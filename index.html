<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Sky Coin Collector</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <!-- Background -->
    <div id="sky"></div>
    <div id="clouds"></div>

    <!-- HUD -->
    <div id="hud">

        <div id="score">
            🪙 Score: 0
        </div>

        <div id="lives">
            ❤️❤️❤️
        </div>

        <div id="highScore">
            🏆 High: 0
        </div>

    </div>

    <!-- Player -->
    <div id="player">
        🪂
    </div>

    <!-- Falling objects appear here -->
    <div id="objects"></div>

    <!-- Start Screen -->
    <div id="startScreen" class="screen">

        <h1>🪂 Sky Coin Collector</h1>

        <p>
            Drag the parachute left and right.<br>
            Collect 🪙 coins.<br>
            Avoid 💣 bombs.<br>
            Collect ⚡ boosts!
        </p>

        <button id="startBtn">
            ▶ Start Game
        </button>

    </div>

    <!-- Game Over -->
    <div id="gameOver" class="screen">

        <h1>Game Over</h1>

        <p id="finalScore">
            Score: 0
        </p>

        <button id="restartBtn">
            🔄 Play Again
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
